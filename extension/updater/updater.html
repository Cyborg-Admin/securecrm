<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KINETIC Update</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #14201c;
        --muted: #5c6b64;
        --line: #d5ddd8;
        --bg: #f4f7f5;
        --ok: #0d7a5f;
        --warn: #c2410c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: linear-gradient(160deg, #d7efe6 0%, var(--bg) 45%, #fff 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(420px, 100%);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 22px 20px;
        box-shadow: 0 12px 32px rgba(20, 32, 28, 0.08);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      #status {
        margin-top: 8px;
        font-weight: 600;
        color: var(--ink);
      }
      #status[data-tone="ok"] {
        color: var(--ok);
      }
      #status[data-tone="warn"] {
        color: var(--warn);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        background: var(--ok);
        color: #fff;
      }
      button.ghost {
        background: #eef3f0;
        color: var(--ink);
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Updating KINETIC</h1>
      <p id="detail">Checking for the latest extension files…</p>
      <p id="status">Starting…</p>
      <div class="actions" id="actions" hidden>
        <button type="button" id="linkFolder">Link extension folder</button>
        <button type="button" id="retry" class="ghost">Retry update</button>
        <button type="button" id="close" class="ghost">Close</button>
      </div>
    </div>
    <script src="../shared/auto-update.js"></script>
    <script src="updater.js"></script>
  </body>
</html>
