<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="kineticTitle kineticDesc">
  <title id="kineticTitle">KINETIC</title>
  <desc id="kineticDesc">Angular K mark with forward motion trails</desc>
  <defs>
    <linearGradient id="kFill" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#109572"/>
      <stop offset="1" stop-color="#0A5C48"/>
    </linearGradient>
  </defs>
  <!-- Motion field -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#D7EFE6"/>
  <!-- Kinetic trails -->
  <path d="M38 18h16" stroke="#0D7A5F" stroke-width="2.4" stroke-linecap="round" opacity=".35"/>
  <path d="M42 32h14" stroke="#0D7A5F" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>
  <path d="M38 46h16" stroke="#0D7A5F" stroke-width="2.4" stroke-linecap="round" opacity=".35"/>
  <!-- Stylized K -->
  <path
    d="M18 14v36M18 32l22-18M18 32l22 18"
    stroke="url(#kFill)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Leading tip -->
  <circle cx="44" cy="32" r="3.2" fill="#0A5C48"/>
</svg>
